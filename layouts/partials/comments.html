<div class="giscus-comments"></div>
<script>
(function () {
  function giscusTheme() {
    return document.documentElement.dataset.theme === "dark" ? "dark" : "light";
  }

  var script = document.createElement("script");
  script.src = "https://giscus.app/client.js";
  script.setAttribute("data-repo", "eshton/humanengineer");
  script.setAttribute("data-repo-id", "R_kgDOSN0NKQ");
  script.setAttribute("data-category", "Comments");
  script.setAttribute("data-category-id", "DIC_kwDOSN0NKc4DAsSQ");
  script.setAttribute("data-mapping", "pathname");
  script.setAttribute("data-strict", "0");
  script.setAttribute("data-reactions-enabled", "1");
  script.setAttribute("data-emit-metadata", "0");
  script.setAttribute("data-input-position", "top");
  script.setAttribute("data-theme", giscusTheme());
  script.setAttribute("data-lang", "en");
  script.setAttribute("data-loading", "lazy");
  script.crossOrigin = "anonymous";
  script.async = true;
  document.querySelector(".giscus-comments").appendChild(script);

  var toggle = document.getElementById("theme-toggle");
  if (toggle) {
    toggle.addEventListener("click", function () {
      // PaperMod's own toggle listener flips html.dataset.theme in the same
      // click event; defer so we read the value after that listener runs,
      // regardless of listener registration order.
      setTimeout(function () {
        var iframe = document.querySelector("iframe.giscus-frame");
        if (!iframe) return;
        iframe.contentWindow.postMessage(
          { giscus: { setConfig: { theme: giscusTheme() } } },
          "https://giscus.app"
        );
      }, 0);
    });
  }
})();
</script>
