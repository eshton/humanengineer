# Netlify build configuration for The Human Engineer (Hugo + PaperMod).
# - Hugo extended is required (PaperMod uses asset processing).
# - baseURL is injected at build time from Netlify's $URL / $DEPLOY_PRIME_URL,
#   so the same hugo.yaml works locally (baseURL: /) and on every Netlify URL.

[build]
  publish = "public"
  command = "hugo --gc --minify --baseURL $URL"

[build.environment]
  HUGO_VERSION = "0.152.2"
  HUGO_ENV = "production"
  HUGO_ENABLEGITINFO = "true"
  TZ = "Europe/Budapest"

# Production / main branch deploys use the live URL.
[context.production.environment]
  HUGO_ENV = "production"

# Deploy previews (PRs) and branch deploys use the preview URL so links resolve there.
[context.deploy-preview]
  command = "hugo --gc --minify --baseURL $DEPLOY_PRIME_URL --buildFuture"

[context.branch-deploy]
  command = "hugo --gc --minify --baseURL $DEPLOY_PRIME_URL --buildFuture"

# Cache headers - hashed asset filenames are immutable; let browsers hold them.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/posts/*/cover_*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/profile_*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
