<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="geometricPrecision">
  <style>
    .bg     { fill: #ffffff; }
    .stroke { stroke: #1d1e20; }
    .fill   { fill: #1d1e20; }
    @media (prefers-color-scheme: dark) {
      .bg     { fill: #1d1e20; }
      .stroke { stroke: #e8e9ee; }
      .fill   { fill: #e8e9ee; }
    }
  </style>
  <rect class="bg" width="64" height="64" rx="14"/>

  <!-- Bulb body: rounded teardrop shape, narrows toward the neck. -->
  <path class="stroke"
        d="M 22 44
           C 14 44, 8 36, 8 26
           C 8 13, 19 4, 32 4
           C 45 4, 56 13, 56 26
           C 56 36, 50 44, 42 44
           L 42 47
           L 22 47 Z"
        fill="none" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Threaded base. -->
  <path class="stroke" d="M 22 47 L 22 53 L 42 53 L 42 47" fill="none" stroke-width="3" stroke-linejoin="round"/>
  <line class="stroke" x1="22" y1="50" x2="42" y2="50" stroke-width="1.6"/>

  <!-- Contact tip: small dome at the bottom. -->
  <path class="stroke"
        d="M 26 53 L 26 56 Q 26 60 32 60 Q 38 60 38 56 L 38 53"
        fill="none" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Circuit filament: square-wave traces with 4 node squares. -->
  <path class="stroke"
        d="M 16 30 L 24 30 L 24 22 L 38 22 L 38 30 L 48 30"
        fill="none" stroke-width="2" stroke-linejoin="miter" stroke-linecap="round"/>
  <rect class="fill" x="14.4" y="28.4" width="3.2" height="3.2"/>
  <rect class="fill" x="22.4" y="20.4" width="3.2" height="3.2"/>
  <rect class="fill" x="36.4" y="20.4" width="3.2" height="3.2"/>
  <rect class="fill" x="46.4" y="28.4" width="3.2" height="3.2"/>
</svg>
