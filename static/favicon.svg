<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="geometricPrecision">
  <rect width="64" height="64" rx="14" fill="#1d1e20"/>

  <!-- Side profile of a head, facing right.
       Smooth path: back of neck -> over the top -> forehead -> nose -> upper lip -> chin -> jaw -> close. -->
  <path d="M 14 64
           L 14 26
           C 14 13, 23 7, 33 7
           C 43 7, 48 13, 48 23
           Q 52 27 52 29
           Q 52 31 48 31
           L 48 33
           Q 47 35 45 36
           Q 48 38 48 41
           Q 48 43 43 43
           L 43 64 Z"
        fill="#e8e9ee"/>

  <!-- Cognitive nodes inside the head, cut out dark to suggest a neural graph -->
  <g fill="#1d1e20">
    <circle cx="23" cy="23" r="1.9"/>
    <circle cx="31" cy="17" r="1.9"/>
    <circle cx="38" cy="22" r="1.9"/>
    <circle cx="27" cy="30" r="1.9"/>
    <circle cx="35" cy="32" r="1.9"/>
  </g>

  <g stroke="#1d1e20" stroke-width="1.3" stroke-linecap="round">
    <line x1="23" y1="23" x2="31" y2="17"/>
    <line x1="31" y1="17" x2="38" y2="22"/>
    <line x1="23" y1="23" x2="27" y2="30"/>
    <line x1="31" y1="17" x2="27" y2="30"/>
    <line x1="38" y1="22" x2="35" y2="32"/>
    <line x1="27" y1="30" x2="35" y2="32"/>
  </g>
</svg>
