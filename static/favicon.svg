<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="geometricPrecision">
  <style>
    .bg     { fill: #ffffff; }
    .stroke { stroke: #1d1e20; }
    .fill   { fill: #1d1e20; }
    @media (prefers-color-scheme: dark) {
      .bg     { fill: #1d1e20; }
      .stroke { stroke: #e8e9ee; }
      .fill   { fill: #e8e9ee; }
    }
  </style>
  <rect class="bg" width="64" height="64" rx="14"/>

  <!-- Bulb head: rounded body with short neck. -->
  <path class="stroke"
        d="M 21 38
           C 16 33, 16 26, 20 21
           C 24 15, 32 13, 38 16
           C 45 19, 47 27, 44 33
           C 42 36, 40 37, 40 39
           L 40 41
           L 24 41
           L 24 39
           C 24 37, 22 36, 21 38 Z"
        fill="none" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Threaded base: short rectangle with two thread lines. -->
  <path class="stroke" d="M 25 41 L 25 47 L 39 47 L 39 41" fill="none" stroke-width="2.4" stroke-linejoin="round"/>
  <line class="stroke" x1="25" y1="44" x2="39" y2="44" stroke-width="1.4"/>

  <!-- Contact tip: small dome at the bottom. -->
  <path class="stroke"
        d="M 28 47 L 28 50 Q 28 53 32 53 Q 36 53 36 50 L 36 47"
        fill="none" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Circuit filament: 3 nodes connected by orthogonal traces. -->
  <!-- Traces -->
  <path class="stroke" d="M 25 30 L 30 30 L 30 25 L 36 25 L 36 30 L 38 30"
        fill="none" stroke-width="1.6" stroke-linejoin="miter" stroke-linecap="round"/>
  <!-- Nodes (small filled squares) -->
  <rect class="fill" x="23.6" y="28.6" width="2.8" height="2.8"/>
  <rect class="fill" x="28.6" y="23.6" width="2.8" height="2.8"/>
  <rect class="fill" x="34.6" y="23.6" width="2.8" height="2.8"/>
  <rect class="fill" x="36.6" y="28.6" width="2.8" height="2.8"/>
</svg>
